<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>King of Snakes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <div class="title">🐍 King of Snakes</div>
    <div class="top-actions">
      <button id="muteButton" type="button">🔊 Mute</button>
      <button id="restartButton" type="button">🔄 Restart</button>
    </div>
  </div>

  <canvas id="gameCanvas" tabindex="0"></canvas>

  <div class="mobile-controls">
    <button class="touch-btn up" id="upBtn" type="button">▲</button>
    <button class="touch-btn left" id="leftBtn" type="button">◀</button>
    <button class="touch-btn down" id="downBtn" type="button">▼</button>
    <button class="touch-btn right" id="rightBtn" type="button">▶</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
